<section class="cta-section">
    <div class="container" style="text-align: center;">
        <h2 class="cta-section__headline reveal">{{ page.cta_headline }}</h2>
        <p class="cta-section__text reveal reveal-delay-1">{{ page.cta_text }}</p>
        <a href="{{ page.cta_href | default: '#' }}" class="btn btn--primary reveal reveal-delay-2">{{ page.cta_button }}</a>
    </div>
</section>
