- number: 1
  title: "Schritt 1: Anfrage stellen"
  text: "Beschreiben Sie uns Ihren Bedarf – ob Festanstellung, Freelancer oder Arbeitnehmerüberlassung. Wir melden uns innerhalb von 24 Stunden."
- number: 2
  title: "Schritt 2: Passgenaue Auswahl erhalten"
  text: "Ihr fester Ansprechpartner analysiert Ihre Anforderungen und präsentiert Ihnen vorqualifizierte Kandidaten aus unserem Netzwerk."
- number: 3
  title: "Schritt 3: Erfolgreich besetzen"
  text: "Sie wählen den passenden Kandidaten. Wir kümmern uns um alle Formalitäten – AÜG-konform und rechtssicher."
